name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build artifact and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release artifact
        run: |
          set -euo pipefail
          mkdir -p dist

          # Write the tag version into VERSION so the tarball is self-describing
          echo "${GITHUB_REF_NAME#v}" > VERSION

          tar -czf dist/dbus-serialinverter.tar.gz VERSION conf etc tests/samlex_tcp_server.py
          sha256sum dist/dbus-serialinverter.tar.gz > dist/dbus-serialinverter.tar.gz.sha256

      - name: Generate changelog and release notes
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          release_date="$(date -u +%Y-%m-%d)"
          previous_tag="$(git describe --tags --match 'v*' --abbrev=0 "${tag}^" 2>/dev/null || true)"

          if [ -n "${previous_tag}" ]; then
            commit_range="${previous_tag}..${tag}"
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
          else
            commit_range="${tag}"
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${tag}"
          fi

          if git log --pretty=format:'- %s (%h)' "${commit_range}" >/tmp/release_commits.txt \
            && [ -s /tmp/release_commits.txt ]; then
            :
          else
            printf '%s\n' "- No commit changes found for this tag." > /tmp/release_commits.txt
          fi

          {
            echo "## ${tag} (${release_date})"
            echo
            echo "### Changes"
            cat /tmp/release_commits.txt
            echo
            echo "### Compare"
            echo "- ${compare_url}"
          } > dist/release-notes.md

          {
            echo "# Changelog"
            echo
            cat dist/release-notes.md
          } > dist/CHANGELOG.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file dist/release-notes.md
            gh release upload "${tag}" \
              dist/dbus-serialinverter.tar.gz \
              dist/dbus-serialinverter.tar.gz.sha256 \
              dist/CHANGELOG.md \
              --clobber
          else
            gh release create "${tag}" \
              dist/dbus-serialinverter.tar.gz \
              dist/dbus-serialinverter.tar.gz.sha256 \
              dist/CHANGELOG.md \
              --title "${tag}" \
              --notes-file dist/release-notes.md
          fi
