[DEFAULT]
PUBLISH_CONFIG_VALUES=1
LOG_LEVEL=DEBUG

[INVERTER]
TYPE=Dummy
ADDRESS=1
POLL_INTERVAL=1000
MAX_AC_POWER=800
PHASE=L1
POSITION=1

# ============================================================
# SAMLEX EVO SERIES REGISTER MAP
# ============================================================
# Register addresses below are protected by Samlex NDA.
# To obtain the "Modbus Communication Protocol Guide":
#   Phone: 604-525-3836
#   Email: techsupport@samlexamerica.com
#   Explain you are integrating with a custom monitoring
#   system (e.g., VenusOS). An NDA may be required.
#
# Once you have the guide, copy config.ini.private.example to
# config.ini.private and fill in the register values there.
# The driver will load config.ini.private if it exists,
# otherwise it uses these template values (??? = skip Samlex).
#
# DO NOT COMMIT config.ini.private TO VERSION CONTROL
# ============================================================
[SAMLEX_REGISTERS]
# AC output ── register addresses are decimal integers; scales are float multipliers
REG_AC_OUT_VOLTAGE    = ???   # uint16, AC volts out — e.g. raw 1200 × 0.1 = 120.0 V
REG_AC_OUT_CURRENT    = ???   # int16, AC amps out  — e.g. raw 150  × 0.1 = 15.0 A
REG_AC_OUT_POWER      = ???   # int16, AC watts out — e.g. raw 600  × 1.0 = 600 W
SCALE_AC_OUT_VOLTAGE  = ???   # float, e.g. 0.1 or 0.01
SCALE_AC_OUT_CURRENT  = ???   # float, e.g. 0.1 or 0.01
SCALE_AC_OUT_POWER    = ???   # float, usually 1.0 (already in watts)

# DC / battery
REG_DC_VOLTAGE        = ???   # uint16, battery volts    — e.g. raw 264 × 0.1 = 26.4 V
REG_DC_CURRENT        = ???   # int16,  battery amps (+charge/-discharge)
REG_SOC               = ???   # uint16, state of charge 0-100 % (no scaling)
SCALE_DC_VOLTAGE      = ???   # float, e.g. 0.1
SCALE_DC_CURRENT      = ???   # float, e.g. 0.1 (sign handled in code)

# AC input / shore power
REG_AC_IN_VOLTAGE     = ???   # uint16, grid/gen volts  — e.g. raw 120 × 1.0 = 120 V
REG_AC_IN_CURRENT     = ???   # int16, grid/gen amps   — e.g. raw 30  × 0.1 = 3.0 A
REG_AC_IN_CONNECTED   = ???   # uint16, working status: 0=Power saving, 1=AC in normal, etc.
SCALE_AC_IN_VOLTAGE   = ???   # float, e.g. 1.0 or 0.1
SCALE_AC_IN_CURRENT   = ???   # float, e.g. 0.1 or 0.01

# Status / fault
REG_FAULT             = ???   # uint16, fault/warn code (0 = no fault)
REG_CHARGE_STATE      = ???   # uint16, charger state code → published to /VebusChargeState

# Identity — read by test_connection() to confirm a Samlex EVO is on this port
REG_IDENTITY          = ???   # uint16, register that holds a device model/ID value
IDENTITY_VALUE        = ???   # integer, expected value in REG_IDENTITY — differs per EVO model
